# ╭──────────────────────────────────────────────────────────╮
# │                         Plugins                          │
# ╰──────────────────────────────────────────────────────────╯

# tmux plugin manager
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

set -g @plugin 'christoomey/vim-tmux-navigator'

set -g @plugin 'tmux-plugins/tmux-yank'

set -g @plugin 'jimeh/tmuxifier'

# tokyo-night theme
set -g @plugin 'fabioluciano/tmux-tokyo-night'
set -g @theme_transparent_status_bar 'true' # Enable transparency

run '~/.config/tmux/plugins/tpm/tpm'

# ╭──────────────────────────────────────────────────────────╮
# │                         Options                          │
# ╰──────────────────────────────────────────────────────────╯

set -g default-terminal 'tmux-256color'

# number windows and panes
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# mouse usage
set -g mouse on

# visual mode
set -g mode-keys vi

# ╭──────────────────────────────────────────────────────────╮
# │                       Keybindings                        │
# ╰──────────────────────────────────────────────────────────╯

# change default prefix
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# quick source tmux config file
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"

# visual mode
unbind -T copy-mode-vi Space
unbind -T copy-mode-vi Enter
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi V send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# TODO check keybindingds below
# increase history
set -g history-limit 10000

# jump to marked pane
bind \` switch-client -t '{marked}'

# more intuitive split commands
unbind %
unbind \"
unbind h
bind h split-window -hc "#{pane_current_path}"
unbind v
bind v split-window -vc "#{pane_current_path}"

# swapping windows
unbind "<"
bind -r "<" swap-window -d -t -1
unbind ">"
bind -r ">" swap-window -d -t +1

# keeping current path
unbind c
bind c new-window -c "#{pane_current_path}"

# toggling windows and sessions
unbind a
bind a last-window
unbind C-a
bind C-a switch-client -l

# resizing
unbind C-j
bind -r C-j resize-pane -D 5
unbind C-k
bind -r C-k resize-pane -U 5
unbind C-h
bind -r C-h resize-pane -L 5
unbind C-l
bind -r C-l resize-pane -R 5

# breaking and joining panes
unbind j
bind j choose-window 'join-pane -h -s"%%"'
unbind J
bind J choose-window 'join-pane -v -s "%%"'

